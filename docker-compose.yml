version: '3.8'

networks:
  churn_network:
    driver: bridge

volumes:
  mlflow_data:
  mlflow_artifacts:

services:
  # Servidor de Rastreamento de Experimentos
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow_data/mlflow.db
      --default-artifact-root /mlflow_artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow_data
      - mlflow_artifacts:/mlflow_artifacts
    networks:
      - churn_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dashboard de Produção
  churn-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: churn_radar_dashboard
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - STREAMLIT_SERVER_PORT=8501
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "app/main_dash.py"]
    volumes:
      - ../data:/app/data
      - ../configs:/app/configs
    networks:
      - churn_network