name: CI - Fast Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  PYTHON_VERSION: '3.12'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # força Node.js 24

jobs:

  code-quality:
    name: [CHECK] Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v5  # versão compatível Node 24

      - uses: actions/setup-python@v6  # versão compatível Node 24
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install black isort flake8 mypy pytest

      - run: black --check src/ app/ tests/
      - run: isort --check-only src/ app/ tests/
      - run: flake8 src/ app/ tests/ --max-line-length=100
      - run: mypy src/ --ignore-missing-imports
      - run: pytest tests/ -q

  mock-data:
    name: [TEST] Mock Data
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install pandas numpy

      - name: Fake data validation
        run: |
          python - <<'EOF'
          import pandas as pd
          import numpy as np

          df = pd.DataFrame({
              "f1": np.random.rand(100),
              "f2": np.random.rand(100),
              "Churned": np.random.randint(0, 2, 100)
          })

          assert df.shape == (100, 3)
          print("OK mock data")
          EOF

  mock-train:
    name: [TEST] Mock Training
    runs-on: ubuntu-latest
    needs: mock-data

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - run: pip install scikit-learn numpy

      - name: Fake training
        run: |
          python - <<'EOF'
          from sklearn.linear_model import LogisticRegression
          import numpy as np

          X = np.random.rand(100, 5)
          y = np.random.randint(0, 2, 100)

          model = LogisticRegression().fit(X, y)
          assert model.score(X, y) > 0.5

          print("OK training")
          EOF

  docker-build:
    name: [DOCKER] Build
    runs-on: ubuntu-latest
    needs: mock-train

    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3

      - name: Build only
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
